collections:
  # Ваші новини (вже є)
  - name: "news"
    label: "Новини"
    folder: "news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Заголовок", name: "title", widget: "string"}
      - {label: "Дата", name: "date", widget: "datetime"}
      - {label: "Текст", name: "body", widget: "markdown"}

  # Додаємо редагування сторінок
  - name: "pages"
    label: "Сторінки"
    folder: "content" # Створіть папку 'content' на GitHub
    create: true
    fields:
      - {label: "Назва сторінки", name: "title", widget: "string"}
      - {label: "Контент", name: "body", widget: "markdown"}
